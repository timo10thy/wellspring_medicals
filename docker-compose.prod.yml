services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pharma_backend
    restart: unless-stopped
    ports:
      - "8002:8000"
    env_file:
      - .env.prod
    networks:
      - pharma_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pharma_frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - pharma_network

networks:
  pharma_network:
    driver: bridge