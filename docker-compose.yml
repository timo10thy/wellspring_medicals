services:
  db:
    image: mysql:8.0
    container_name: pharma_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: pharma_inventory
      MYSQL_USER: pharma_user
      MYSQL_PASSWORD: pharma_password
    ports:
      - "3316:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - pharma_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  phpmyadmin:
    image: phpmyadmin:5.2.1
    container_name: pharma_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: pharma_user
      PMA_PASSWORD: pharma_password
    ports:
      - "8081:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pharma_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pharma_backend
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: pharma_inventory
      DB_USER: pharma_user
      DB_PASSWORD: pharma_password
      JWT_SECRET_KEY: your-super-secret-jwt-key-change-this-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_KEY: 720
      ADMIN_SETUP_TOKEN: pharma-admin-2024-xK9mP3
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - pharma_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pharma_frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - pharma_network

volumes:
  db_data:

networks:
  pharma_network:
    driver: bridge
