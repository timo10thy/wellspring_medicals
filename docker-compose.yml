services:
  db:
    image: postgres:16
    container_name: pharma_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pharma_inventory
      POSTGRES_USER: pharma_user
      POSTGRES_PASSWORD: pharma_password
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - pharma_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharma_user -d pharma_inventory"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pharma_backend
    restart: unless-stopped
    ports:
      - "8002:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pharma_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pharma_frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - pharma_network

volumes:
  db_data:

networks:
  pharma_network:
    driver: bridge